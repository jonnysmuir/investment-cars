name: Refresh Listings

on:
  schedule:
    # Run daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run listings refresh
        id: refresh
        run: node scripts/refresh.js

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "Collectorly Bot"
          git config user.email "bot@collectorly.com"
          git add data/
          git commit -m "Daily refresh: $(date +%Y-%m-%d)

          $(head -20 scripts/summary.md)"
          git push

      - name: Create GitHub Issue with summary
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Listings refresh: ${{ github.event.repository.name }} — $(date +%Y-%m-%d)"
          content-filepath: scripts/summary.md
          labels: automated-refresh

      - name: Send email notification
        if: steps.check.outputs.has_changes == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/send-email.js

      - name: Upload summary as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-summary
          path: scripts/summary.md
          retention-days: 30
