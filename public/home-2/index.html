<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collectorly — Gallery Showcase</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #0a0a0a;
      --color-surface: #141414;
      --color-border: #2a2a2a;
      --color-text: #e8e8e8;
      --color-text-muted: #888;
      --color-accent: #c9a84c;
      --nav-bg: rgba(10, 10, 10, 0.85);
      --btn-text: #0a0a0a;
    }

    .light {
      --color-bg: #f5f3ef;
      --color-surface: #ffffff;
      --color-border: #ddd8d0;
      --color-text: #1a1a1a;
      --color-text-muted: #666;
      --color-accent: #b8942e;
      --nav-bg: rgba(245, 243, 239, 0.88);
      --btn-text: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-accent);
      text-decoration: none;
    }

    .logo:hover { opacity: 0.85; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    nav a {
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--color-accent); }

    .theme-toggle {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── Hero Mosaic ── */
    .hero-mosaic {
      height: 100vh;
      padding-top: 72px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
    }

    .mosaic-cell {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
    }

    .mosaic-cell:first-child {
      grid-row: 1 / 3;
    }

    .mosaic-cell .mosaic-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s ease, filter 0.6s ease;
    }

    .mosaic-cell:hover .mosaic-bg {
      transform: scale(1.05);
      filter: brightness(1.15);
    }

    .mosaic-cell .mosaic-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.05) 100%);
      z-index: 1;
    }

    .mosaic-cell .mosaic-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 2rem;
      z-index: 2;
    }

    .mosaic-label h3 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    .mosaic-cell:first-child .mosaic-label h3 {
      font-size: 1.6rem;
    }

    .mosaic-label .mosaic-price {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.25rem;
      letter-spacing: 0.03em;
    }

    /* ── Skeleton loading ── */
    .skeleton {
      background: linear-gradient(90deg, var(--color-surface) 25%, var(--color-border) 50%, var(--color-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .mosaic-skeleton {
      height: 100vh;
      padding-top: 72px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
    }

    .mosaic-skeleton .skeleton-cell {
      background: linear-gradient(90deg, var(--color-surface) 25%, #1a1a1a 50%, var(--color-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .light .mosaic-skeleton .skeleton-cell {
      background: linear-gradient(90deg, var(--color-surface) 25%, #eae7e1 50%, var(--color-surface) 75%);
      background-size: 200% 100%;
    }

    .mosaic-skeleton .skeleton-cell:first-child {
      grid-row: 1 / 3;
    }

    /* ── Tagline Strip ── */
    .tagline-strip {
      padding: 4rem 3rem;
      text-align: center;
    }

    .tagline-strip p {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
    }

    .tagline-strip span {
      color: var(--color-accent);
      font-weight: 500;
    }

    /* ── Section shared ── */
    .section {
      padding: 5rem 3rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 2.5rem;
    }

    /* ── Browse by Make ── */
    .makes-row {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 0.5rem;
    }

    .makes-row::-webkit-scrollbar { display: none; }

    .make-card {
      flex: 0 0 220px;
      height: 100px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: var(--color-text);
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .make-card:hover {
      border-color: var(--color-accent);
      transform: translateY(-2px);
    }

    .make-card .make-name {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .make-card .make-count {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-top: 0.25rem;
    }

    .makes-skeleton {
      display: flex;
      gap: 1rem;
    }

    .makes-skeleton .skeleton {
      flex: 0 0 220px;
      height: 100px;
    }

    /* ── Featured Models ── */
    .models-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .model-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: #fff;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .model-card:hover {
      transform: scale(1.015);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .model-card-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .model-card:hover .model-card-image {
      transform: scale(1.04);
    }

    .model-card-image-wrap {
      overflow: hidden;
      position: relative;
      height: 250px;
    }

    .model-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      z-index: 1;
    }

    .model-card-overlay h3 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .model-card-meta {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
    }

    .models-skeleton {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .models-skeleton .skeleton {
      height: 250px;
      border-radius: 8px;
    }

    /* ── CTA Strip ── */
    .cta-strip {
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
      padding: 5rem 3rem;
      text-align: center;
    }

    .cta-strip p {
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
      letter-spacing: 0.03em;
    }

    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn-primary {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      background: var(--color-accent);
      color: var(--btn-text);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 4px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-outline {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      background: transparent;
      color: var(--color-text);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-outline:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      transform: translateY(-1px);
    }

    /* ── Contact Form ── */
    .contact-section {
      padding: 5rem 3rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .contact-section .section-title {
      text-align: center;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 0.9rem 1.1rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: var(--color-text-muted);
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: var(--color-accent);
    }

    .contact-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .contact-form button {
      align-self: flex-start;
    }

    /* ── Footer ── */
    footer {
      padding: 3rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
      border-top: 1px solid var(--color-border);
    }

    /* ── Fade-in animation ── */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .models-grid,
      .models-skeleton {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 1rem 1.5rem;
      }

      .nav-right {
        gap: 1rem;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .nav-right::-webkit-scrollbar { display: none; }

      .hero-mosaic,
      .mosaic-skeleton {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1.5fr 1fr 1fr;
      }

      .mosaic-cell:first-child {
        grid-column: 1 / 3;
        grid-row: 1 / 2;
      }

      .mosaic-skeleton .skeleton-cell:first-child {
        grid-column: 1 / 3;
        grid-row: 1 / 2;
      }

      .section {
        padding: 3.5rem 1.5rem;
      }

      .tagline-strip {
        padding: 3rem 1.5rem;
      }

      .tagline-strip p {
        font-size: 1.1rem;
      }

      .cta-strip {
        padding: 3.5rem 1.5rem;
      }

      .cta-buttons {
        flex-direction: column;
        align-items: center;
      }

      .contact-section {
        padding: 3.5rem 1.5rem;
      }

      .make-card {
        flex: 0 0 170px;
        height: 85px;
        padding: 1rem 1.25rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Collectorly</a>
    <div class="nav-right">
      <a href="/home-1">Home 1</a>
      <a href="/home-2">Home 2</a>
      <a href="/home-3">Home 3</a>
      <a href="/home-4">Home 4</a>
      <a href="/listings">Listings</a>
      <a href="/analysis">Analysis</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light mode">&#9790;</button>
    </div>
  </nav>

  <!-- Hero Mosaic -->
  <div id="heroMosaic">
    <div class="mosaic-skeleton">
      <div class="skeleton-cell"></div>
      <div class="skeleton-cell"></div>
      <div class="skeleton-cell"></div>
      <div class="skeleton-cell"></div>
      <div class="skeleton-cell"></div>
    </div>
  </div>

  <!-- Tagline Strip -->
  <section class="tagline-strip fade-in" id="tagline">
    <p>Market intelligence for <span id="taglineCount">&#8212;</span> collector car models</p>
  </section>

  <!-- Browse by Make -->
  <section class="section fade-in">
    <h2 class="section-title">Browse by Make</h2>
    <div id="makesRow">
      <div class="makes-skeleton">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>
  </section>

  <!-- Featured Models -->
  <section class="section fade-in">
    <h2 class="section-title">Popular Models</h2>
    <div id="modelsGrid">
      <div class="models-skeleton">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>
  </section>

  <!-- CTA Strip -->
  <section class="cta-strip fade-in">
    <p>Track prices, discover trends, find your next car.</p>
    <div class="cta-buttons">
      <a href="/listings" class="btn-primary">Browse Listings</a>
      <a href="/analysis" class="btn-outline">Market Analysis</a>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="contact-section fade-in">
    <h2 class="section-title">Get in Touch</h2>
    <form class="contact-form" onsubmit="return handleContact(event)">
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Message"></textarea>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>&copy; 2026 Collectorly. All rights reserved.</footer>

  <script>
    /* ── Theme toggle ── */
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') document.documentElement.classList.add('light');
      const btn = document.getElementById('themeToggle');
      btn.innerHTML = document.documentElement.classList.contains('light') ? '&#9728;' : '&#9790;';
      btn.addEventListener('click', function () {
        document.documentElement.classList.toggle('light');
        const isLight = document.documentElement.classList.contains('light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        btn.innerHTML = isLight ? '&#9728;' : '&#9790;';
      });
    })();

    /* ── Intersection observer for fade-in ── */
    const observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(function (el) {
      observer.observe(el);
    });

    /* ── Helpers ── */
    function formatPrice(n) {
      if (n == null) return '';
      return '\u00a3' + Number(n).toLocaleString('en-GB');
    }

    /* ── Fetch data & render ── */
    fetch('/api/homepage')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        renderMosaic(data);
        renderTagline(data);
        renderMakes(data);
        renderModels(data);
      })
      .catch(function (err) {
        console.error('Failed to load homepage data:', err);
      });

    /* ── Hero Mosaic ── */
    function renderMosaic(data) {
      var models = (data.mostActive || []).slice(0, 5);
      if (!models.length) return;

      var html = '<div class="hero-mosaic">';
      models.forEach(function (m) {
        html += '<a href="/analysis/' + m.slug + '" class="mosaic-cell">'
          + '<div class="mosaic-bg" style="background-image:url(' + m.heroImage + ')"></div>'
          + '<div class="mosaic-overlay"></div>'
          + '<div class="mosaic-label">'
          + '<h3>' + m.displayName + '</h3>'
          + '<div class="mosaic-price">From ' + formatPrice(m.median) + '</div>'
          + '</div></a>';
      });
      html += '</div>';

      document.getElementById('heroMosaic').innerHTML = html;
    }

    /* ── Tagline ── */
    function renderTagline(data) {
      var count = data.totalModels || '&#8212;';
      document.getElementById('taglineCount').textContent = count;
    }

    /* ── Makes ── */
    function renderMakes(data) {
      var makes = data.makes || [];
      var html = '<div class="makes-row">';
      makes.forEach(function (m) {
        html += '<a href="/listings?make=' + m.key + '" class="make-card">'
          + '<div class="make-name">' + m.name + '</div>'
          + '<div class="make-count">' + m.count + ' models</div>'
          + '</a>';
      });
      html += '</div>';
      document.getElementById('makesRow').innerHTML = html;
    }

    /* ── Featured Models ── */
    function renderModels(data) {
      var models = (data.allModels || [])
        .slice()
        .sort(function (a, b) { return (b.listingCount || 0) - (a.listingCount || 0); })
        .slice(0, 6);

      var html = '<div class="models-grid">';
      models.forEach(function (m) {
        html += '<a href="/analysis/' + m.slug + '" class="model-card">'
          + '<div class="model-card-image-wrap">'
          + '<img class="model-card-image" src="' + m.heroImage + '" alt="' + m.displayName + '" loading="lazy">'
          + '<div class="model-card-overlay">'
          + '<h3>' + m.displayName + '</h3>'
          + '<div class="model-card-meta">'
          + '<span>Median ' + formatPrice(m.median) + '</span>'
          + '<span>' + (m.listingCount || 0) + ' listings</span>'
          + '</div></div></div></a>';
      });
      html += '</div>';
      document.getElementById('modelsGrid').innerHTML = html;
    }

    /* ── Contact form ── */
    function handleContact(e) {
      e.preventDefault();
      var btn = e.target.querySelector('button');
      btn.textContent = 'Sent — Thank you';
      btn.disabled = true;
      btn.style.opacity = '0.6';
      return false;
    }
  </script>

</body>
</html>
